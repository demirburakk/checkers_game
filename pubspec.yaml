name: checkers_game
description: "A checkers game project."
publish_to: 'none'

version: 1.0.1+12

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- UI & Core ---
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dynamic_color: ^1.7.0
  flutter_native_splash: ^2.4.0

  # --- State & Storage ---
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  json_annotation: ^4.9.0

  # --- Hardware & Media ---
  vibration: ^3.1.3
  audioplayers: ^6.0.0

  intl: ^0.20.2
  connectivity_plus: ^6.1.5
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/images/icon.png"

  adaptive_icon_background: "#333333"

  adaptive_icon_foreground: "assets/images/icon.png"

  min_sdk_android: 21


flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/boards/
    - assets/images/
    - assets/pieces/
    - assets/ranks/
    - assets/sounds/
